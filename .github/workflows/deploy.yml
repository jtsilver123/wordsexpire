name: Deploy WordsExpire

# Deploys the Worker from GitHub's runners, which can reach Cloudflare.
# Requires one repository secret: CLOUDFLARE_API_TOKEN.
# Optionally also set IP_HASH_SALT and ADMIN_TOKEN to harden the live site.

on:
  push:
    branches:
      - main
      - claude/clever-mendel-Th9C6
  workflow_dispatch: {}

# Only the newest deploy matters; cancel any still in flight.
concurrency:
  group: deploy-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Job-level env so the step `if:` conditions below can actually read these.
    # A step's own `env:` block is not visible to that same step's `if:`.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      IP_HASH_SALT: ${{ secrets.IP_HASH_SALT }}
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Deploy Worker
        run: npx wrangler deploy

      # Set runtime secrets if they were provided. These run even if the deploy
      # step above failed while re-asserting routes: the script itself uploads
      # first, and putting a secret is an account-level op that never touches
      # the zone routes endpoint, so it succeeds with the same token.
      - name: Set IP_HASH_SALT
        if: ${{ always() && env.IP_HASH_SALT != '' }}
        run: printf '%s' "$IP_HASH_SALT" | npx wrangler secret put IP_HASH_SALT

      - name: Set ADMIN_TOKEN
        if: ${{ always() && env.ADMIN_TOKEN != '' }}
        run: printf '%s' "$ADMIN_TOKEN" | npx wrangler secret put ADMIN_TOKEN
